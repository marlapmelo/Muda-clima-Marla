<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- Biblioteca Chart.js para gráficos -->
    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="./css/header.css">
    <link rel="stylesheet" href="./css/footer.css">
    <link rel="stylesheet" href="./css/graph.css">
    <script src="plot.js" type="module"></script> <!-- Importando o script em javascript para gerar o gráfico -->
    <script src="filter.js" type="module"></script> <!-- Importando o script em javascript que fornecem informações sobre o filtro -->
    <script src="utils/export.js" type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script> <!-- Permite a exportação de dados no formato xlsx -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script> <!-- Permite a exportação de dados no formato pdf -->
    <title>Muda Clima</title>
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="../img/logoclimars.png" alt="Logo ClimArS" class="logo-img">
            <h2>Muda Clima</h2>
        </div>
    <nav>
      <ul>
        <li><a href="/home">Home</a></li>
            <li><a href="/front-page.html">Gráfico</a></li>
            <li><a href="#" id="btn-predicao">Previsões Mensais Pneumonia</a></li>
            <li><a href="#" id="btn-predicao-beta">Previsões Multiplas</a></li>
            <li><a href="/cadastro">Criar uma conta</a></li>
      </ul>
    </nav>
  </header>


    <div class="plot">
        <div class="filter">
            <form id="filter-form">
                <label for="uf">UF:</label>
                <input list="ufs-list" id="uf" placeholder="Digite a UF" value="RS">
                <datalist id="ufs-list"></datalist>

                <label for="city">Cidade:</label>
                <input list="cities-list" id="city" placeholder="Digite a cidade" value="Rio Grande">
                <datalist id="cities-list"></datalist>

                <label for="station">Selecione a estação climática:</label>
                <select id="station" disabled>
                    <option value="">Escolha uma estação</option>
                </select>

                <div class="disease-selector">
                    <label for="disease-options">Selecione a(s) doença(s):</label>
                    <div class="selected-diseases-container" id="selected-diseases">
                    </div>
                    <div class="disease-add-controls">
                        <select id="disease-options">
                        </select>
                        <button type="button" id="add-disease-btn">+</button>
                    </div>
                </div>

                <label for="start-date">Data Inicial:</label>
                <input type="date" id="start-date">
                
                <label for="end-date">Data Final:</label>
                <input type="date" id="end-date">
                
                <label for="inmet">Selecione uma coluna:</label>
                    <select id="inmet">
                        <option value="dir_vento">Direção do vento</option>
                        <option value="insolacao">Insolação</option>
                        <option value="dias_chuva">Dias de chuva</option>
                        <option value="pressao">Pressao</option>
                        <option value="radiacao">Radiacao</option>
                        <option value="temp_ar">Temperatura do ar</option>
                        <option value="temp_orvalho">Temperatura orvalho</option>
                        <option value="temp_max">Temperatura máxima</option>
                        <option value="temp_min">Temperatura mínima</option>
                        <option value="umidade">Umidade</option>
                        <option value="vel_vento">Velocidade do vento</option>
                        <option value="vento_rajada">Vento rajada</option>
                    </select>

                <button id="btn-filtrar" type="button">Filtrar</button>
            </form>
            <select id="export-format">
                <option value="csv">CSV</option>
                <option value="xlsx">XLSX</option>
                <option value="pdf">PDF</option>
                <option value="png">PNG</option>
              </select>
            <button id="export-button">Exportar Dados</button>
        </div>
        
        <div class="chart-container"> 
            <canvas id="internacoesChart" width="1000" height="500"></canvas>
            <div id="loading-overlay" class="hidden">
                <div class="loading-spinner"></div>
                <p>Carregando dados...</p>
            </div>
        </div>
    </div>

    
    <footer>
        <p>© 2025 CNPQ - Projeto "Associação entre as variáveis climáticas e as internações por doenças respiratórias"</p>
    </footer>


  <!-- ========================================================= -->
  <!-- ===================== CHATBOT POPUP ===================== -->
  <!-- ========================================================= -->

<link rel="stylesheet" href="/css/popup.css">

<script>
document.addEventListener("DOMContentLoaded", () => {


  const btn = document.createElement("div");
  btn.id = "chat-float-btn";
  btn.innerHTML = "💬";
  document.body.appendChild(btn);

  const popup = document.createElement("iframe");
  popup.id = "chat-popup";
  popup.src = "/chat.html";
  document.body.appendChild(popup);

  btn.addEventListener("click", () => {
    if (popup.classList.contains("open")) {
      popup.classList.remove("open");
      setTimeout(() => popup.style.display = "none", 200);
    } else {
      popup.style.display = "block";
      setTimeout(() => popup.classList.add("open"), 10);
    }
  });

});
</script>


<script>
  document.addEventListener("DOMContentLoaded", function () {
    const btnPredicao = document.getElementById("btn-predicao");
    const btnPredicaoBeta = document.getElementById("btn-predicao-beta");

    if (btnPredicao) {
      btnPredicao.addEventListener("click", function (e) {
        e.preventDefault();
        window.location.href = "/dashboard.html?view=shiny";
      });
    }

    if (btnPredicaoBeta) {
      btnPredicaoBeta.addEventListener("click", function (e) {
        e.preventDefault();
        window.location.href = "/dashboard.html?view=xgb";
      });
    }
  });
</script>


</body>
</html>
