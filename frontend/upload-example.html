<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Service - Exemplo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f1ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8e9ff;
            transform: scale(1.02);
        }

        .upload-area p {
            color: #666;
            margin-bottom: 10px;
        }

        .upload-area small {
            color: #999;
            display: block;
            margin-top: 10px;
        }

        input[type="file"] {
            display: none;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #ff5252;
        }

        .files-list {
            background: #f8f9ff;
            border-radius: 8px;
            padding: 20px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: white;
            border-radius: 5px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .file-info {
            flex: 1;
        }

        .file-info h3 {
            font-size: 14px;
            color: #333;
            margin-bottom: 5px;
        }

        .file-info p {
            font-size: 12px;
            color: #999;
        }

        .file-actions {
            display: flex;
            gap: 10px;
        }

        .file-actions button {
            padding: 6px 12px;
            font-size: 12px;
        }

        .status {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loader {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #667eea;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 30px;
        }

        footer {
            background: #f8f9ff;
            padding: 20px;
            text-align: center;
            color: #666;
            font-size: 12px;
            border-top: 1px solid #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📤 Upload Service</h1>
            <p>Gerenciador centralizado de uploads para Muda-Clima</p>
        </header>

        <div class="content">
            <!-- Health Check -->
            <div class="section">
                <h2>Status do Serviço</h2>
                <button class="btn-primary" onclick="checkHealth()">Verificar Saúde</button>
                <div id="healthStatus"></div>
            </div>

            <!-- Upload Area -->
            <div class="section">
                <h2>Upload de Arquivos</h2>
                
                <div class="upload-area" id="uploadArea">
                    <p>📁 Arraste arquivos aqui ou clique para selecionar</p>
                    <small>Formatos aceitos: PDF, XLSX, CSV, PNG, JPG | Máximo: 50MB</small>
                </div>
                
                <input type="file" id="fileInput" multiple />
                
                <div class="button-group">
                    <button class="btn-primary" onclick="selectFile()">Selecionar Arquivo</button>
                    <button class="btn-primary" onclick="selectMultiple()">Selecionar Múltiplos</button>
                </div>

                <div id="uploadStatus"></div>
            </div>

            <!-- Files List -->
            <div class="section">
                <h2>Arquivos Enviados</h2>
                <button class="btn-secondary" onclick="listFiles()">Atualizar Lista</button>
                <div id="filesList" style="margin-top: 20px;"></div>
            </div>
        </div>

        <footer>
            Upload Service © 2026 | Muda-Clima FURG
        </footer>
    </div>

    <script src="js/upload-client.js"></script>
    <script>
        const uploadClient = new UploadClient('http://localhost:3001');
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        // Drag and Drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', async (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 1) {
                await uploadMultiple(files);
            } else if (files.length === 1) {
                await uploadFile(files[0]);
            }
        });

        uploadArea.addEventListener('click', () => fileInput.click());

        function selectFile() {
            fileInput.multiple = false;
            fileInput.onchange = async () => {
                if (fileInput.files[0]) {
                    await uploadFile(fileInput.files[0]);
                }
            };
            fileInput.click();
        }

        function selectMultiple() {
            fileInput.multiple = true;
            fileInput.onchange = async () => {
                if (fileInput.files.length > 0) {
                    await uploadMultiple(fileInput.files);
                }
            };
            fileInput.click();
        }

        async function uploadFile(file) {
            const statusDiv = document.getElementById('uploadStatus');
            statusDiv.innerHTML = '<div class="status loading"><span class="loader"></span>Enviando...</div>';

            try {
                const result = await uploadClient.uploadFile(file);
                if (result.success) {
                    statusDiv.innerHTML = `<div class="status success">✓ ${result.message}</div>`;
                    listFiles();
                } else {
                    statusDiv.innerHTML = `<div class="status error">✗ Erro: ${result.message}</div>`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<div class="status error">✗ Erro: ${error.message}</div>`;
            }
        }

        async function uploadMultiple(files) {
            const statusDiv = document.getElementById('uploadStatus');
            statusDiv.innerHTML = `<div class="status loading"><span class="loader"></span>Enviando ${files.length} arquivo(s)...</div>`;

            try {
                const result = await uploadClient.uploadMultiple(files);
                if (result.success) {
                    statusDiv.innerHTML = `<div class="status success">✓ ${result.message}</div>`;
                    listFiles();
                } else {
                    statusDiv.innerHTML = `<div class="status error">✗ Erro: ${result.message}</div>`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<div class="status error">✗ Erro: ${error.message}</div>`;
            }
        }

        async function listFiles() {
            const filesDiv = document.getElementById('filesList');
            filesDiv.innerHTML = '<div class="status loading"><span class="loader"></span>Carregando...</div>';

            try {
                const data = await uploadClient.listFiles();
                
                if (data.files.length === 0) {
                    filesDiv.innerHTML = '<div class="empty-message">Nenhum arquivo enviado ainda</div>';
                } else {
                    filesDiv.innerHTML = '<div class="files-list">' + 
                        data.files.map(file => `
                            <div class="file-item">
                                <div class="file-info">
                                    <h3>${file.filename}</h3>
                                    <p>Tamanho: ${(file.size / 1024 / 1024).toFixed(2)}MB | 
                                       Enviado: ${new Date(file.uploadedAt).toLocaleString('pt-BR')}</p>
                                </div>
                                <div class="file-actions">
                                    <button class="btn-primary" onclick="downloadFile('${file.filename}')">Download</button>
                                    <button class="btn-danger" onclick="deleteFile('${file.filename}')">Deletar</button>
                                </div>
                            </div>
                        `).join('') + 
                        '</div>';
                }
            } catch (error) {
                filesDiv.innerHTML = `<div class="status error">✗ Erro ao listar: ${error.message}</div>`;
            }
        }

        async function deleteFile(filename) {
            if (confirm(`Deseja deletar "${filename}"?`)) {
                try {
                    const result = await uploadClient.deleteFile(filename);
                    if (result.success) {
                        listFiles();
                    }
                } catch (error) {
                    alert(`Erro ao deletar: ${error.message}`);
                }
            }
        }

        function downloadFile(filename) {
            uploadClient.downloadFile(filename);
        }

        async function checkHealth() {
            const statusDiv = document.getElementById('healthStatus');
            statusDiv.innerHTML = '<div class="status loading"><span class="loader"></span>Verificando...</div>';

            const health = await uploadClient.health();
            
            if (health.status === 'UP') {
                statusDiv.innerHTML = `<div class="status success">✓ Serviço online</div>`;
            } else {
                statusDiv.innerHTML = `<div class="status error">✗ Serviço offline</div>`;
            }
        }

        // Carregar lista de arquivos ao iniciar
        listFiles();
    </script>
</body>
</html>
